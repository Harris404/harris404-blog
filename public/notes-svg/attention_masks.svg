<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="sh" x="-4%" y="-6%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="960" height="420" fill="#fff"/>

  <text x="480" y="28" text-anchor="middle" fill="#111827" font-size="18" font-weight="800">Attention Mask 机制详解</text>
  <text x="480" y="46" text-anchor="middle" fill="#4b5563" font-size="12" font-weight="500">同一个 Transformer · 改变 Mask 就变成不同角色</text>

  <!-- Code -->
  <rect x="220" y="56" width="520" height="58" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="240" y="74" fill="#374151" font-size="10" font-family="monospace" font-weight="500">scores = Q @ K.T / √d</text>
  <text x="240" y="89" fill="#dc2626" font-size="10" font-family="monospace" font-weight="800">scores = scores + mask     ← Mask 在 softmax 之前！</text>
  <text x="240" y="104" fill="#374151" font-size="10" font-family="monospace" font-weight="500">weights = softmax(scores)  <tspan fill="#059669" font-weight="700"># -∞ → 变成 0</tspan></text>

  <!-- Mask 1 -->
  <g transform="translate(25, 130)">
    <rect width="290" height="270" rx="10" fill="#fff" stroke="#16a34a" stroke-width="3" filter="url(#sh)"/>
    <rect width="290" height="42" rx="10" fill="#16a34a"/>
