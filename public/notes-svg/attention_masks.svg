    <text x="145" y="60" text-anchor="middle" fill="#065f46" font-size="11" font-weight="700">图文匹配 (ITM) → 像 BERT Encoder</text>

    <text x="110" y="82" text-anchor="middle" fill="#374151" font-size="10" font-weight="700">Q₁</text>
    <text x="145" y="82" text-anchor="middle" fill="#374151" font-size="10" font-weight="700">Q₂</text>
    <text x="180" y="82" text-anchor="middle" fill="#374151" font-size="10" font-weight="700">T₁</text>
