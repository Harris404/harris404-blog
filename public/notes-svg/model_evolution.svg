<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="sh" x="-4%" y="-8%" width="108%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <rect width="960" height="340" rx="0" fill="#fff"/>

  <text x="480" y="30" text-anchor="middle" fill="#111827" font-size="20" font-weight="800">多模态视觉-语言模型演进路线</text>

  <!-- Timeline -->
  <line x1="70" y1="115" x2="890" y2="115" stroke="#9ca3af" stroke-width="3" stroke-linecap="round"/>

  <!-- Year labels -->
  <text x="120" y="144" text-anchor="middle" fill="#374151" font-size="12" font-weight="700">2021</text>
  <text x="310" y="144" text-anchor="middle" fill="#374151" font-size="12" font-weight="700">2022</text>
  <text x="500" y="144" text-anchor="middle" fill="#374151" font-size="12" font-weight="700">2023.01</text>
  <text x="690" y="144" text-anchor="middle" fill="#374151" font-size="12" font-weight="700">2023.04</text>
  <text x="850" y="144" text-anchor="middle" fill="#374151" font-size="12" font-weight="700">2023.03</text>

  <!-- Dots -->
  <circle cx="120" cy="115" r="9" fill="#2563eb" stroke="#fff" stroke-width="2"/>
  <circle cx="310" cy="115" r="9" fill="#d97706" stroke="#fff" stroke-width="2"/>
  <circle cx="500" cy="115" r="9" fill="#059669" stroke="#fff" stroke-width="2"/>
  <circle cx="690" cy="115" r="9" fill="#7c3aed" stroke="#fff" stroke-width="2"/>
  <circle cx="850" cy="115" r="9" fill="#dc2626" stroke="#fff" stroke-width="2"/>

  <!-- CLIP -->
  <rect x="50" y="48" width="140" height="52" rx="8" fill="#2563eb" filter="url(#sh)"/>
  <text x="120" y="70" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">CLIP</text>
  <text x="120" y="89" text-anchor="middle" fill="#bfdbfe" font-size="10">对比学习 · 双编码器</text>

  <!-- CoCa -->
  <rect x="240" y="48" width="140" height="52" rx="8" fill="#d97706" filter="url(#sh)"/>
  <text x="310" y="70" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">CoCa</text>
  <text x="310" y="89" text-anchor="middle" fill="#fef3c7" font-size="10">对比+生成 · 全训练🔥</text>

  <!-- BLIP-2 -->
  <rect x="430" y="48" width="140" height="52" rx="8" fill="#059669" filter="url(#sh)"/>
  <text x="500" y="70" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">BLIP-2</text>
  <text x="500" y="89" text-anchor="middle" fill="#d1fae5" font-size="10">冻结❄️ · Q-Former桥梁</text>

  <!-- LLaVA -->
  <rect x="620" y="48" width="140" height="52" rx="8" fill="#7c3aed" filter="url(#sh)"/>
  <text x="690" y="70" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">LLaVA</text>
  <text x="690" y="89" text-anchor="middle" fill="#ede9fe" font-size="10">线性投影W · 指令微调</text>

  <!-- GPT-4V -->
  <rect x="790" y="48" width="120" height="52" rx="8" fill="#dc2626" filter="url(#sh)"/>
  <text x="850" y="70" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">GPT-4V</text>
  <text x="850" y="89" text-anchor="middle" fill="#fecaca" font-size="10">架构未知 · 超强</text>

  <!-- Arrows -->
  <line x1="190" y1="115" x2="238" y2="115" stroke="#374151" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="380" y1="115" x2="428" y2="115" stroke="#374151" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="570" y1="115" x2="618" y2="115" stroke="#374151" stroke-width="2" marker-end="url(#a1)"/>

  <text x="214" y="108" text-anchor="middle" fill="#b45309" font-size="9" font-weight="700">+生成</text>
  <text x="404" y="108" text-anchor="middle" fill="#047857" font-size="9" font-weight="700">太贵！</text>
  <text x="594" y="108" text-anchor="middle" fill="#6d28d9" font-size="9" font-weight="700">更简更强</text>

  <!-- Bars -->
  <text x="50" y="178" fill="#111827" font-size="11" font-weight="700">训练数据量</text>
  <rect x="150" y="166" width="110" height="16" rx="3" fill="#3b82f6"/>
  <text x="158" y="179" fill="#fff" font-size="9" font-weight="600">CLIP: 4亿</text>
  <rect x="310" y="166" width="200" height="16" rx="3" fill="#f59e0b"/>
  <text x="318" y="179" fill="#fff" font-size="9" font-weight="600">CoCa: 40亿+</text>
  <rect x="500" y="166" width="70" height="16" rx="3" fill="#10b981"/>
  <text x="508" y="179" fill="#fff" font-size="9" font-weight="600">1.29亿</text>
  <rect x="690" y="166" width="25" height="16" rx="3" fill="#8b5cf6"/>
  <text x="720" y="179" fill="#6d28d9" font-size="9" font-weight="600">75万</text>

  <text x="50" y="208" fill="#111827" font-size="11" font-weight="700">训练参数</text>
  <rect x="150" y="196" width="100" height="16" rx="3" fill="#60a5fa"/>
  <text x="158" y="209" fill="#fff" font-size="9" font-weight="600">全部</text>
  <rect x="310" y="196" width="140" height="16" rx="3" fill="#fbbf24"/>
  <text x="318" y="209" fill="#fff" font-size="9" font-weight="600">全部 (787M)</text>
  <rect x="500" y="196" width="35" height="16" rx="3" fill="#34d399"/>
  <text x="542" y="209" fill="#047857" font-size="9" font-weight="700">104M ✓</text>
  <rect x="690" y="196" width="55" height="16" rx="3" fill="#a78bfa"/>
  <text x="750" y="209" fill="#6d28d9" font-size="9" font-weight="600">W+LLM</text>

  <text x="50" y="238" fill="#111827" font-size="11" font-weight="700">能力范围</text>
  <rect x="150" y="226" width="65" height="16" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="158" y="238" fill="#1e40af" font-size="9" font-weight="600">分类+检索</text>
  <rect x="310" y="226" width="105" height="16" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="318" y="238" fill="#92400e" font-size="9" font-weight="600">+VQA+描述</text>
  <rect x="500" y="226" width="85" height="16" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="508" y="238" fill="#065f46" font-size="9" font-weight="600">+描述+推理</text>
  <rect x="690" y="226" width="110" height="16" rx="3" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="698" y="238" fill="#5b21b6" font-size="9" font-weight="600">+指令跟随+对话</text>

  <!-- Bottom insight -->
  <rect x="100" y="268" width="760" height="52" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="480" y="290" text-anchor="middle" fill="#854d0e" font-size="13" font-weight="800">💡 核心趋势：训练数据越来越少，训练参数越来越少，但能力越来越强</text>
  <text x="480" y="308" text-anchor="middle" fill="#713f12" font-size="11">关键：复用预训练模型 + 高质量数据 + 聪明的架构设计</text>
</svg>
